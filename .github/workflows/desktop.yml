name: Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.2). Leave empty to build HEAD."
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Tag to build. When set, the job checks out this tag and enables release-mode signing/publishing."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  mac:
    name: Build macOS Desktop App
    runs-on: macos-latest
    env:
      RELEASE_MODE: ${{ (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.tag, 'v')) && 'true' || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Bake Google OAuth defaults into the desktop build
        if: env.GOOGLE_OAUTH_CLIENT_ID != ''
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const target = path.join("desktop", "src", "bundled-secrets.cjs");
          const body = `module.exports = {\n  GOOGLE_OAUTH_CLIENT_ID: ${JSON.stringify(process.env.GOOGLE_OAUTH_CLIENT_ID || "")},\n  GOOGLE_OAUTH_CLIENT_SECRET: ${JSON.stringify(process.env.GOOGLE_OAUTH_CLIENT_SECRET || "")},\n};\n`;
          fs.writeFileSync(target, body);
          console.log("wrote " + target);
          NODE
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

      - name: Require signing and notarization secrets for release tags
        if: env.RELEASE_MODE == 'true'
        run: |
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Detect Mac App Store secrets
        if: env.RELEASE_MODE == 'true'
        run: |
          missing=()
          for name in MAS_CSC_LINK MAS_CSC_KEY_PASSWORD MAS_PROVISIONING_PROFILE_BASE64 APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Mac App Store build skipped; missing secret(s): ${missing[*]}. Signed DMG/zip will still publish."
            echo "MAS_ENABLED=false" >> "$GITHUB_ENV"
          else
            echo "MAS_ENABLED=true" >> "$GITHUB_ENV"
          fi
        env:
          MAS_CSC_LINK: ${{ secrets.MACOS_APPSTORE_CSC_LINK }}
          MAS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_APPSTORE_CSC_KEY_PASSWORD }}
          MAS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Prepare Mac App Store provisioning profile
        if: env.RELEASE_MODE == 'true' && env.MAS_ENABLED == 'true'
        run: |
          profile_path="$RUNNER_TEMP/vibe-research-mas.provisionprofile"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          profile = os.environ["MAS_PROVISIONING_PROFILE_BASE64"]
          out = Path(os.environ["RUNNER_TEMP"]) / "vibe-research-mas.provisionprofile"
          out.write_bytes(base64.b64decode(profile))
          PY
          security cms -D -i "$profile_path" >/dev/null
          echo "MAS_PROVISIONING_PROFILE=$profile_path" >> "$GITHUB_ENV"
        env:
          MAS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAS_PROVISIONING_PROFILE_BASE64 }}

      - name: Build desktop app
        run: |
          if [[ "$RELEASE_MODE" == "true" ]]; then
            npm --prefix desktop run dist -- --mac dmg zip --universal --publish always
          else
            npm --prefix desktop run dist -- --mac dmg zip --universal --publish never
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload stable-named DMG for website download link
        if: env.RELEASE_MODE == 'true'
        run: |
          dmg="$(ls desktop/dist/Vibe-Research-*-mac-*.dmg 2>/dev/null | head -n1)"
          if [ -z "$dmg" ]; then
            echo "No DMG found in desktop/dist; skipping stable-name upload" >&2
            exit 0
          fi
          # Prefer the explicit workflow_call input, fall back to the tag ref
          # when this workflow was triggered by a push to refs/tags/v*.
          tag="${INPUT_TAG:-${GITHUB_REF##refs/tags/}}"
          if [ -z "$tag" ] || [[ "$tag" == refs/* ]]; then
            echo "::error::Could not determine release tag for stable-name upload (GITHUB_REF=$GITHUB_REF INPUT_TAG=$INPUT_TAG)"
            exit 1
          fi
          cp "$dmg" "$RUNNER_TEMP/Vibe-Research-macOS.dmg"
          gh release upload "$tag" "$RUNNER_TEMP/Vibe-Research-macOS.dmg" --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}

      - name: Build Mac App Store package
        if: env.RELEASE_MODE == 'true' && env.MAS_ENABLED == 'true'
        run: |
          npm --prefix desktop run dist:mas -- --config.mas.provisioningProfile="$MAS_PROVISIONING_PROFILE"
        env:
          CSC_LINK: ${{ secrets.MACOS_APPSTORE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_APPSTORE_CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAS_PROVISIONING_PROFILE: ${{ env.MAS_PROVISIONING_PROFILE }}

      - name: Upload Mac App Store package to App Store Connect
        if: env.RELEASE_MODE == 'true' && env.MAS_ENABLED == 'true'
        run: |
          pkg_file="$(ls -1 desktop/dist/*.pkg | head -n 1)"
          if [ -z "$pkg_file" ]; then
            echo "No .pkg found in desktop/dist after MAS build" >&2
            exit 1
          fi

          xcrun altool --validate-app -f "$pkg_file" -t osx -u "$APPLE_ID" -p "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun altool --upload-app -f "$pkg_file" -t osx -u "$APPLE_ID" -p "$APPLE_APP_SPECIFIC_PASSWORD"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vibe-research-macos-desktop
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.pkg
            desktop/dist/*.blockmap
            desktop/dist/latest-mac.yml

name: Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mac:
    name: Build macOS Desktop App
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Build desktop app
        run: npm --prefix desktop run dist -- --mac dmg zip --publish never

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-research-macos-desktop
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.blockmap

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload "${GITHUB_REF_NAME}" desktop/dist/*.dmg desktop/dist/*.zip desktop/dist/*.blockmap --clobber
        env:
          GH_TOKEN: ${{ github.token }}

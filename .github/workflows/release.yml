name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      ignore_ci:
        description: Ship even if CI is red (use for known flakes)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read_tag.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CI is green on HEAD
        if: ${{ inputs.ignore_ci != true }}
        run: |
          commit_sha=$(git rev-parse HEAD)
          echo "Checking CI status on $commit_sha"
          # Look for the CI workflow's "Test" check on this commit and require success.
          conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${commit_sha}/check-runs?per_page=100" \
            --jq '[.check_runs[] | select(.name == "Test")] | sort_by(.started_at) | last | .conclusion // "missing"')
          echo "Latest Test check conclusion: ${conclusion}"
          if [ "$conclusion" = "success" ]; then
            echo "CI is green ✓"
            exit 0
          fi
          if [ "$conclusion" = "missing" ]; then
            echo "::error::No CI run found on ${commit_sha}. Push a trivial commit so CI runs, then retry."
          elif [ "$conclusion" = "null" ] || [ -z "$conclusion" ]; then
            echo "::error::CI on ${commit_sha} is still in progress. Wait for it to finish before cutting a release."
          else
            echo "::error::CI on ${commit_sha} is ${conclusion}. Fix main and get CI green before cutting a release."
          fi
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Ensure generated client is committed
        run: git diff --exit-code -- public/app.js public/vendor/xterm.css

      - name: Check formatting whitespace
        run: git diff --check

      - name: Audit high severity dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        if: ${{ inputs.ignore_ci != true }}
        run: npm test || (echo "::warning::first test run failed; retrying once" && npm test)

      - name: Configure release author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish release
        run: npm run release -- "${{ inputs.bump }}"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Read published tag
        id: read_tag
        run: |
          tag=$(node -p "require('./release-channel.json').tag")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Published tag: $tag"

  desktop:
    name: Build Desktop App
    needs: release
    uses: ./.github/workflows/desktop.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

services:
  - type: web
    name: vibe-research-app
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node src/server.js
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: vibe-research-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VIBE_RESEARCH_ROOT
        value: /var/data/vibe-research

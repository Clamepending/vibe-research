<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vibe Research — Projects</title>
  <link rel="stylesheet" href="/research/research.css" />
</head>
<body>
  <header class="vr-header">
    <div class="vr-header-inner">
      <h1><a href="/research">Vibe Research</a> <span class="vr-header-sub">/ projects</span></h1>
      <a class="vr-app-link" href="/" title="Open the main app">app →</a>
    </div>
  </header>

  <main class="vr-main">
    <section id="org-bench-section" class="vr-card vr-org-bench" aria-busy="false">
      <h2>Organization benchmark</h2>
      <p class="vr-card-empty">Loading benchmark controls…</p>
    </section>

    <section id="projects-section" aria-busy="true">
      <p class="vr-status" id="status">Loading projects…</p>
      <ol id="project-list" class="vr-project-list" hidden></ol>
    </section>
  </main>

  <script src="/research/research.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      window.VibeResearchPage.renderProjectList();
    });
  </script>
</body>
</html>
